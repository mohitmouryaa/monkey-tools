# NETWORK #
bind 0.0.0.0
port 6379
protected-mode no
# Increase backlog for high connections during traffic spikes
tcp-backlog 511

# GENERAL #
daemonize no
loglevel notice

# MEMORY MANAGEMENT (CRITICAL FOR QUEUES) #
# Set a max memory limit (e.g., 2GB or 4GB depending on your server)
maxmemory 2gb

# POLICY: noeviction
# If memory is full, return an error. NEVER delete keys automatically.
# This forces the application to handle the backpressure rather than losing jobs.
maxmemory-policy noeviction

# PERSISTENCE (AOF vs RDB) #
# We prefer AOF (Append Only File) for queues.
# RDB (Snapshots) can lose minutes of data if the server crashes.

appendonly yes
appendfilename "appendonly.aof"

# Fsync every second.
# Worst case data loss on power failure: 1 second of jobs.
# "always" is too slow; "no" is too risky.
appendfsync everysec

# AUTO-REWRITE AOF
# Prevents the log file from growing infinitely
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# SNAPSHOTTING (RDB) #
# Keep RDB as a backup, but rely on AOF for recovery.
save 900 1
save 300 10
save 60 10000

# PERFORMANCE TUNING #
# Stop background saving if it fails (alerts you something is wrong)
stop-writes-on-bgsave-error yes

# COMPRESSION #
rdbcompression yes

# LATENCY MONITORING #
# Useful for debugging slow jobs
latency-monitor-threshold 0